# Faction: Supreme Leader's Office (Beyt-e Rahbari)
# The center of power in the Islamic Republic

id: supreme_leader_office

name:
  fa: بیت رهبری
  en: Supreme Leader's Office

shortName:
  fa: بیت
  en: Beyt

description:
  fa: |
    دفتر رهبری مرکز اصلی قدرت در جمهوری اسلامی است. آیت‌الله خامنه‌ای بیش از
    سه دهه رهبری را بر عهده داشته و حالا سوال جانشینی به مهم‌ترین مسئله تبدیل
    شده است. بیت شبکه‌ای از نمایندگان، روحانیون، و مشاوران را کنترل می‌کند.
  en: |
    The Supreme Leader's Office is the main center of power in the Islamic Republic.
    Ayatollah Khamenei has held leadership for over three decades and now the
    succession question has become the most important issue. The Beyt controls
    a network of representatives, clerics, and advisors.

