description:
  fa: |
    شیراز پایتخت فرهنگی ایران و زادگاه حافظ و سعدی است. این شهر به باغ‌ها،
    شعر، و سنت‌های فرهنگی‌اش شهرت دارد. شیراز نسبت به سایر شهرهای بزرگ
    آرام‌تر است اما جامعه مدنی فعالی دارد.
  en: |
    Shiraz is Iran's cultural capital and birthplace of Hafez and Saadi. The city
    is renowned for its gardens, poetry, and cultural traditions. Shiraz is calmer
    than other major cities but has an active civil society.

