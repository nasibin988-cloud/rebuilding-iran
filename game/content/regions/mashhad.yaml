description:
  fa: |
    مشهد دومین شهر بزرگ ایران و مهم‌ترین مرکز زیارتی شیعیان در کشور است.
    آستان قدس رضوی، متولی حرم امام رضا، یکی از ثروتمندترین نهادهای ایران است.
    مشهد ترکیبی از مذهبی بودن سنتی و طبقه متوسط مدرن دارد.
  en: |
    Mashhad is Iran's second largest city and the most important Shia pilgrimage
    center in the country. The Astan Quds Razavi foundation, which manages the
    Imam Reza shrine, is one of Iran's wealthiest institutions. Mashhad has a mix
    of traditional religiosity and a modern middle class.

