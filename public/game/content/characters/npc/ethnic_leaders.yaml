      en: Azerbaijani Rights Activist
    portrait: lesani.png
    biography:
      fa: |
        فعال حقوق زبانی و فرهنگی آذربایجان. چندین بار زندانی شده.
        مدافع آموزش به زبان ترکی در مدارس.
      en: |
        Azerbaijani linguistic and cultural rights activist. Imprisoned
