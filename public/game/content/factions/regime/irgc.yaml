# Faction: Islamic Revolutionary Guard Corps (IRGC)
# The military-economic backbone of the Islamic Republic

id: irgc

name:
  fa: سپاه پاسداران انقلاب اسلامی
  en: Islamic Revolutionary Guard Corps

shortName:
  fa: سپاه
  en: IRGC

description:
  fa: |
    سپاه پاسداران نیروی نظامی-اقتصادی-سیاسی است که از نظام محافظت می‌کند.
    با کنترل بر بخش‌های کلیدی اقتصاد، نیروی قدس، و سایبری، سپاه یکی از
    قدرتمندترین نهادهای ایران است. اما یکپارچه نیست - جناح‌های مختلفی
    با منافع متفاوت در درون آن وجود دارد.
  en: |
    The IRGC is a military-economic-political force that protects the system.
    With control over key economic sectors, the Quds Force, and cyber operations,
    the IRGC is one of Iran's most powerful institutions. But it's not monolithic -
    different factions with different interests exist within it.

