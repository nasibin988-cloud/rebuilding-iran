# Playable Character: The Reformist Politician
# A former insider trying to change the system from within

id: reformist_politician

name:
  fa: آرش پارسایی
  en: Arash Parsaei

title:
  fa: نماینده سابق مجلس
  en: Former Member of Parliament

portrait: reformist_politician.png

biography:
  fa: |
    یک سیاستمدار میانه‌رو که زمانی در قلب نظام قرار داشت. شما در انتخابات ۱۳۸۸
    شاهد سرکوب جنبش سبز بودید و از آن زمان به دنبال راهی برای اصلاحات واقعی
    هستید. شبکه‌ای از روابط در میان اصلاح‌طلبان و حتی برخی محافظه‌کاران
    میانه‌رو دارید، اما زیر نظر دستگاه امنیتی هستید.
  en: |
    A moderate politician who was once at the heart of the system. You witnessed
    the suppression of the Green Movement in 2009 and have since sought a path
    toward genuine reform. You have a network of connections among reformists
    and even some moderate conservatives, but you are under security surveillance.

