backstory:
  fa: خانواده شما صد سال است در این بازار کار می‌کند. شما رازهای زیادی می‌دانید.
  en: Your family has worked in this bazaar for a hundred years. You know many secrets.

motivations:
  fa: حفظ تجارت خانوادگی و آینده فرزندان
  en: Preserving the family business and children's future

challenges:
  - fa: مدیریت تحریم‌ها و کمبودها
