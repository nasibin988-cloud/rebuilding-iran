description:
  fa: |
    اصفهان، «نصف جهان» لقب گرفته و یکی از مهم‌ترین شهرهای تاریخی و فرهنگی ایران است.
    این شهر مرکز صنعت فولاد و نظامی کشور است و طبقه متوسط قوی و سنت‌های فرهنگی
    غنی دارد.
  en: |
    Isfahan, nicknamed "half the world," is one of Iran's most important historical
    and cultural cities. It is the center of the country's steel and military
    industry and has a strong middle class and rich cultural traditions.

