# Faction: Kurdish Parties
# Political parties representing Kurdish interests and autonomy demands

id: kurdish_parties

name:
  fa: احزاب کردی
  en: Kurdish Parties

shortName:
  fa: کردها
  en: Kurds

description:
  fa: |
    احزاب کردی نماینده منافع جمعیت کرد ایران هستند که عمدتاً در غرب کشور
    ساکن‌اند. این احزاب طیفی از خواسته‌ها را مطرح می‌کنند، از حقوق فرهنگی
    تا خودمختاری منطقه‌ای. برخی از آنها مسلح هستند و سابقه درگیری با حکومت دارند.
  en: |
    Kurdish parties represent the interests of Iran's Kurdish population, mainly
    living in the western provinces. These parties advocate for a range of demands,
    from cultural rights to regional autonomy. Some are armed and have a history
    of conflict with the government.

