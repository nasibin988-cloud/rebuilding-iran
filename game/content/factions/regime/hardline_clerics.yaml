  fa: تندروها
  en: Hardliners

description:
  fa: |
    روحانیون تندرو بخش محافظه‌کار حوزه علمیه قم هستند که بر شورای نگهبان،
    قوه قضاییه، و بسیاری نهادهای دینی تسلط دارند. آنها مخالف سرسخت اصلاحات
    و مدافع تفسیر سختگیرانه از اسلام سیاسی هستند.
  en: |
    The hardline clerics are the conservative faction of the Qom seminary who
    dominate the Guardian Council, judiciary, and many religious institutions.
    They fiercely oppose reforms and defend a strict interpretation of political
    Islam.

