# Playable Character: The Diaspora Intellectual
# A scholar and activist abroad, working to shape Iran's future from outside

id: diaspora_intellectual

name:
  fa: داریوش مهرگان
  en: Dariush Mehregan

title:
  fa: روشنفکر در تبعید
  en: Intellectual in Exile

portrait: diaspora_intellectual.png

biography:
  fa: |
    یک نویسنده و تحلیلگر سیاسی که سال‌هاست در خارج زندگی می‌کند. شما پس از
    سرکوب جنبش سبز ایران را ترک کردید. اکنون صدای جنبش دموکراسی‌خواهی ایران
    در مجامع بین‌المللی محسوب می‌شوید. شبکه گسترده‌ای در میان دیاسپورای
    ایرانی دارید و با رسانه‌های بین‌المللی و سازمان‌های حقوق بشر در ارتباط هستید.
  en: |
    A writer and political analyst who has lived abroad for years. You left Iran
    after the Green Movement crackdown. Now you are considered a voice for Iran's
    democracy movement in international forums. You have an extensive network among
    the Iranian diaspora and connections with international media and human rights
    organizations.

