description:
  fa: |
    ایرانیان خارج از کشور که برای تغییر در ایران فعالیت می‌کنند. این گروه
    شامل روشنفکران، روزنامه‌نگاران، فعالان حقوق بشر و سیاستمداران تبعیدی است.
    آنها از آزادی بیان در خارج برای افشای وضعیت ایران استفاده می‌کنند.
  en: |
    Iranians abroad who work for change in Iran. This group includes intellectuals,
    journalists, human rights activists, and exiled politicians. They use their
    freedom of expression abroad to expose conditions in Iran.

