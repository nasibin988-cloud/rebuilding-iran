description:
  fa: |
    ایرانیان خارج از کشور در سراسر جهان پراکنده‌اند. از لس‌آنجلس تا لندن،
    از تورنتو تا برلین، میلیون‌ها ایرانی در تبعید یا مهاجرت زندگی می‌کنند.
    آنها از آزادی بیان برخوردارند اما از وطن دورند.
  en: |
    Iranians abroad are scattered around the world. From Los Angeles to London,
    from Toronto to Berlin, millions of Iranians live in exile or emigration.
    They enjoy freedom of expression but are far from home.

