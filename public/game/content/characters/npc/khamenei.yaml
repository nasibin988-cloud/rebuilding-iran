  fa: |
    رهبر جمهوری اسلامی از سال ۱۳۶۸. بیش از سه دهه در راس قدرت بوده و
    نظام را از بحران‌های متعدد عبور داده است. اکنون در سن ۸۵ سالگی،
    سوال جانشینی مهم‌ترین چالش پیش روی اوست.
  en: |
    Leader of the Islamic Republic since 1989. Has been at the helm of power
    for over three decades and guided the system through numerous crises.
    Now at 85, the succession question is his most important challenge.

