# Multiple NPC Definitions: Opposition Figures

characters:
  # Reza Pahlavi
  - id: reza_pahlavi
    name:
      fa: رضا پهلوی
      en: Reza Pahlavi
    title:
      fa: ولیعهد سابق ایران
      en: Former Crown Prince of Iran
    portrait: reza_pahlavi.png
    biography:
      fa: |
        فرزند آخرین شاه ایران. از سال ۱۹۷۹ در تبعید. در سال‌های اخیر تلاش
        کرده خود را به عنوان چهره وحدت‌بخش اپوزیسیون معرفی کند.
      en: |
        Son of the last Shah of Iran. In exile since 1979. In recent years
        has tried to present himself as a unifying figure for the opposition.
    role: diaspora_leader
    faction: monarchists
    psychology:
      coreBeliefs:
        - Iran needs secular democracy
        - Monarchy can be constitutional
        - Unity is key to change
      fears:
        - Irrelevance
        - Regime collapse into chaos
        - Being used by foreign powers
      motivations:
        - Return to Iran
        - Restore family honor
        - Lead transition
    traits: [diplomatic, cautious, media_savvy, privileged, patient]
    behavior:
      aggression: 20
      caution: 70
      pragmatism: 65
    stats:
      health: 90
      influence: 45
      popularity: 25
    tags: [npc, opposition, diaspora, monarchist]

  # Mohammad Khatami
  - id: khatami
    name:
      fa: سید محمد خاتمی
      en: Seyyed Mohammad Khatami
    title:
      fa: رئیس‌جمهور سابق
      en: Former President
    portrait: khatami.png
    biography:
      fa: |
        رئیس‌جمهور دوره اصلاحات (۱۳۷۶-۱۳۸۴). اکنون تحت محدودیت رسانه‌ای
        و ممنوع‌الخروج. نماد اصلاحات و همچنین ناامیدی از آن.
      en: |
        President during the reform era (1997-2005). Now under media ban
        and travel restrictions. Symbol of reform and also disillusionment with it.
    role: former_president
    faction: reformists
    traits: [intellectual, cautious, philosophical, disillusioned, symbolic]
    behavior:
      aggression: 10
      caution: 90
      pragmatism: 50
    stats:
      health: 75
      influence: 35
      popularity: 30
    tags: [npc, opposition, reformist, former_official]

  # Mir Hossein Mousavi
  - id: mousavi
    name:
      fa: میرحسین موسوی
      en: Mir Hossein Mousavi
    title:
      fa: نخست‌وزیر سابق
      en: Former Prime Minister
    portrait: mousavi.png
    biography:
      fa: |
        نخست‌وزیر دوران جنگ (۱۳۶۰-۱۳۶۸) و کاندیدای ریاست‌جمهوری ۱۳۸۸.
        از سال ۱۳۸۹ تحت حصر خانگی. نماد مقاومت و فداکاری.
      en: |
        Prime Minister during the war (1981-1989) and 2009 presidential candidate.
        Under house arrest since 2010. Symbol of resistance and sacrifice.
    role: political_prisoner
    faction: green_movement
    traits: [principled, artistic, stubborn, symbolic, isolated]
    behavior:
      aggression: 30
      caution: 60
      pragmatism: 40
    stats:
      health: 60
      influence: 40
      popularity: 35
    tags: [npc, opposition, green_movement, house_arrest]

