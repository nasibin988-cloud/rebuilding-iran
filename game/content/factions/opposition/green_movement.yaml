# Faction: Green Movement
# The pro-democracy movement that emerged from the 2009 protests

id: green_movement

name:
  fa: جنبش سبز
  en: Green Movement

shortName:
  fa: سبزها
  en: Greens

description:
  fa: |
    جنبش سبز از اعتراضات ۱۳۸۸ برخاست و خواستار دموکراسی، حقوق مدنی،
    و پایان سرکوب بود. هرچند سرکوب شد، اما ایده‌های آن زنده مانده و
    در اعتراضات بعدی بازتولید شده است. رهبران آن هنوز در حصر خانگی هستند.
  en: |
    The Green Movement emerged from the 2009 protests demanding democracy,
    civil rights, and an end to repression. Though suppressed, its ideas
    survived and were reproduced in later protests. Its leaders remain under
    house arrest.

