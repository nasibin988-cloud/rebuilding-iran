# Playable Character: The Bazaar Merchant
# A traditional merchant navigating economic and political pressures

id: bazaari

name:
  fa: بهمن کیانی
  en: Bahman Kiani

title:
  fa: تاجر بازار
  en: Bazaar Merchant

portrait: bazaari.png

biography:
  fa: |
    یک تاجر سنتی در بازار بزرگ تهران که نسل‌ها پیشینه تجاری دارد. شما بین فشارهای
    اقتصادی رژیم و خواسته‌های مردم گیر کرده‌اید. بازار همیشه قدرت داشته است و
    شما می‌دانید چگونه از این قدرت استفاده کنید.
  en: |
    A traditional merchant in Tehran's Grand Bazaar with generations of trading
    heritage. You are caught between the regime's economic pressures and the
    people's demands. The bazaar has always had power and you know how to use it.

