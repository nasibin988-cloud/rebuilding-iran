# Faction: Student Movement
# University students who have been at the forefront of protests throughout Iranian history

id: students

name:
  fa: جنبش دانشجویی
  en: Student Movement

shortName:
  fa: دانشجویان
  en: Students

description:
  fa: |
    دانشجویان در طول تاریخ ایران پیشتاز اعتراضات و جنبش‌های اجتماعی بوده‌اند.
    از انقلاب ۵۷ تا جنبش سبز و اعتراضات اخیر، دانشگاه‌ها همیشه کانون فعالیت
    سیاسی بوده‌اند. جنبش دانشجویی متنوع است اما اغلب خواستار آزادی و اصلاحات است.
  en: |
    Students have been at the forefront of protests and social movements throughout
    Iranian history. From the 1979 revolution to the Green Movement and recent
    protests, universities have always been centers of political activity. The
    student movement is diverse but generally demands freedom and reforms.

