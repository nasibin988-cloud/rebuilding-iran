  fa: فرزند رهبر
  en: Son of the Leader

portrait: mojtaba.png

biography:
  fa: |
    پسر دوم آیت‌الله خامنه‌ای که در سایه قدرت رشد کرده است. گفته می‌شود
    نقش مهمی در سرکوب جنبش سبز ۸۸ داشت. بدون سابقه روحانیت رسمی، اما
    با شبکه‌ای قوی در سپاه و دستگاه امنیتی.
  en: |
    Second son of Ayatollah Khamenei who grew up in the shadow of power.
    Reportedly played a key role in suppressing the 2009 Green Movement.
    No formal clerical credentials, but with a strong network in the IRGC
    and security apparatus.

