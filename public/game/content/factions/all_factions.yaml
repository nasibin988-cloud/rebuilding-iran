      en: Industrial workers, teachers, and retirees fighting for economic rights.
    category: society
    subcategory: labor
    power:
      base: 30
      military: 5
      economic: 25
      religious: 10
      popular: 45
    ideology:
      economicLeft: 75
      socialLiberal: 60
      nationalist: 55
      religious: 25
      democratic: 70
    interests:
      survival: [Wages, Job security, Union rights]
      shortTerm: [Pension payments, End corruption]
      longTerm: [Independent unions, Social justice]
      redLines: [Privatization without protection, Mass layoffs]
    behavior:
      aggression: 45
      cooperation: 65
      riskTolerance: 55
      pragmatism: 60
    color: "#dc2626"
    tags: [society, labor, economic_justice]

