# Playable Character: The Student Activist
# A young voice of the new generation, radicalized by recent events

id: student_activist

name:
  fa: روشنک آزادی
  en: Roshanak Azadi

title:
  fa: فعال دانشجویی
  en: Student Activist

portrait: student_activist.png

biography:
  fa: |
    یک دانشجوی ۲۴ ساله که در خیزش ۱۴۰۱ به خیابان آمد و دیگر هرگز به زندگی
    عادی برنگشت. شما شاهد کشته شدن دوستانتان بودید. اکنون در شبکه‌های زیرزمینی
    فعال هستید و می‌دانید که بازگشتی نیست. سوال این است: چه آینده‌ای می‌خواهید
    بسازید و چه بهایی حاضرید بپردازید؟
  en: |
    A 24-year-old student who took to the streets in the 2022 uprising and never
    returned to normal life. You witnessed friends being killed. Now you're active
    in underground networks and know there's no going back. The question is: what
    future do you want to build and what price are you willing to pay?

