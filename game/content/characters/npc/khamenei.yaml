# NPC Character: Supreme Leader Ali Khamenei
# The aging Supreme Leader whose health is failing

id: khamenei

name:
  fa: آیت‌الله علی خامنه‌ای
  en: Ayatollah Ali Khamenei

title:
  fa: رهبر معظم انقلاب اسلامی
  en: Supreme Leader of the Islamic Revolution

portrait: khamenei.png

role: supreme_leader

biography:
  fa: |
    رهبر جمهوری اسلامی از سال ۱۳۶۸. پس از درگذشت آیت‌الله خمینی به
    رهبری رسید و قدرت را به تدریج تحکیم کرد. اکنون در دهه نهم زندگی
    است و سلامت او موضوع گمانه‌زنی‌های فراوان است.
  en: |
    Leader of the Islamic Republic since 1989. He rose to leadership after
    Ayatollah Khomeini's death and gradually consolidated power. Now in his
    ninth decade, his health is subject to much speculation.

