backstory:
  fa: |
    متولد ۱۳۷۹ در کرج. در خانواده‌ای طبقه متوسط بزرگ شدید که پدرتان مهندس
    و مادرتان معلم بود. اینترنت پنجره‌ای به جهان برایتان باز کرد.

    دانشجوی جامعه‌شناسی دانشگاه تهران بودید که مهسا امینی کشته شد. آن روز
    همه چیز عوض شد. اولین شب به خیابان آمدید، فقط برای اعتراض. اما وقتی
    گاز اشک‌آور و باتوم دیدید، وقتی دوستتان را بردند، دیگر برنگشتید.

    شش ماه زندگی مخفیانه، سازماندهی شبانه، رد شدن از فیلترینگ، یادگیری
    رمزنگاری. حالا شما دیگر آن دختر ساده نیستید. شما یک سازمان‌ده هستید.
  en: |
    Born in 2000 in Karaj. You grew up in a middle-class family - your father
    an engineer, your mother a teacher. The internet opened a window to the world.

    You were a sociology student at Tehran University when Mahsa Amini was killed.
    That day everything changed. The first night you went to the street, just to
    protest. But when you saw tear gas and batons, when they took your friend,
    you never went back to normal.

    Six months of hiding, organizing at night, bypassing filtering, learning
    encryption. Now you're no longer that simple girl. You're an organizer.

motivations:
  fa: |
    شما می‌خواهید سیستمی که دوستانتان را کشت سرنگون شود. اما همچنین می‌دانید
    که خشونت بی‌هدف فقط بهانه سرکوب بیشتر می‌دهد. باید راهی پیدا کنید که
    هم موثر باشد و هم انسانی.
  en: |
    You want the system that killed your friends to fall. But you also know that
    purposeless violence only gives excuse for more repression. You must find a
    way that is both effective and humane.

challenges:
  - fa: همیشه در خطر دستگیری هستید
    en: You're always at risk of arrest
  - fa: منابع محدودی دارید
    en: You have limited resources
  - fa: باید به شبکه‌های مختلف اعتماد کنید
    en: You must trust various networks
  - fa: تروما و استرس مداوم
    en: Ongoing trauma and stress
  - fa: نسل قدیمی‌تر شما را درک نمی‌کند
    en: The older generation doesn't understand you

difficulty: hard

