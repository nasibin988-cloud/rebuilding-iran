backstory:
  fa: |
    متولد ۱۳۴۸ در تهران، در یک خانواده مذهبی اما روشنفکر بزرگ شدید. در دوران
    دانشجویی در دانشگاه تهران با ایده‌های اصلاح‌طلبانه آشنا شدید. پس از انقلاب،
    مانند بسیاری دیگر، امیدوار به تحقق آرمان‌های عدالت‌خواهانه بودید.

    در دهه ۷۰ وارد سیاست شدید و به مجلس ششم راه یافتید - مجلسی که به خاطر
    اصلاحاتش معروف شد اما در نهایت توسط شورای نگهبان محدود گردید. این تجربه
    به شما آموخت که تغییر در این نظام چقدر دشوار است.

    در سال ۸۸، از نزدیک شاهد سرکوب جنبش سبز بودید. دوستانی را از دست دادید.
    برخی زندانی شدند. این نقطه عطفی در زندگی شما بود.
  en: |
    Born in 1969 in Tehran, you grew up in a religious but intellectual family.
    During your university years at Tehran University, you became acquainted with
    reformist ideas. After the revolution, like many others, you hoped for the
    realization of justice-oriented ideals.

    In the 1990s you entered politics and were elected to the Sixth Majlis -
    a parliament known for its reforms but ultimately constrained by the Guardian
    Council. This experience taught you how difficult change within this system is.

    In 2009, you witnessed the suppression of the Green Movement up close. You lost
    friends. Some were imprisoned. This was a turning point in your life.

motivations:
  fa: |
    شما باور دارید که ایران می‌تواند از درون اصلاح شود، اما این نیازمند صبر،
    استراتژی، و ائتلاف‌سازی هوشمندانه است. هدف شما ایجاد فضای سیاسی بازتر،
    بدون خشونت و بدون تخریب کامل نهادها است.
  en: |
    You believe Iran can be reformed from within, but this requires patience,
    strategy, and smart coalition-building. Your goal is to create more open
    political space, without violence and without completely destroying institutions.

challenges:
  - fa: دستگاه امنیتی شما را زیر نظر دارد
    en: The security apparatus is watching you
  - fa: بسیاری از جوانان به اصلاحات از درون باور ندارند
    en: Many young people don't believe in reform from within
  - fa: اعتماد به اصلاح‌طلبان پس از ناکامی‌های گذشته کاهش یافته
    en: Trust in reformists has declined after past failures
  - fa: باید میان اصول و مصلحت تعادل برقرار کنید
    en: You must balance principles with pragmatism

difficulty: normal

