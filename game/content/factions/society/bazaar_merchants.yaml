description:
  fa: |
    بازاریان طبقه سنتی تجار ایران هستند که نقش مهمی در اقتصاد و سیاست دارند.
    آنها در انقلاب ۵۷ نقش کلیدی داشتند و همچنان با روحانیون و حکومت ارتباط
    نزدیک دارند، هرچند منافعشان همیشه با سیاست‌های دولت همسو نیست.
  en: |
    The Bazaar merchants are Iran's traditional merchant class with significant
    economic and political influence. They played a key role in the 1979 revolution
    and maintain close ties with the clergy and government, though their interests
    don't always align with state policies.

