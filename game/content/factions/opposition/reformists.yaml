# Faction: Reformists (Eslah-talaban)
# The loyal opposition trying to change the system from within

id: reformists

name:
  fa: اصلاح‌طلبان
  en: Reformists

shortName:
  fa: اصلاح‌طلبان
  en: Reformists

description:
  fa: |
    جناح اصلاح‌طلب شامل سیاستمداران، روشنفکران، و روحانیونی است که معتقدند
    نظام می‌تواند از درون اصلاح شود. پس از سرکوب جنبش سبز در ۱۳۸۸ و خیزش
    ۱۴۰۱، موقعیت آنها ضعیف شده اما همچنان شبکه‌ای از ارتباطات دارند.
  en: |
    The reformist faction includes politicians, intellectuals, and clerics who
    believe the system can be reformed from within. After the suppression of
    the Green Movement in 2009 and the 2022 uprising, their position has weakened
    but they still have a network of connections.

