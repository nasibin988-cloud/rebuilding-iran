description:
  fa: |
    تبریز مرکز استان آذربایجان شرقی و بزرگ‌ترین شهر آذری‌نشین ایران است.
    این شهر تاریخ غنی از فعالیت سیاسی دارد، از انقلاب مشروطه تا امروز.
    تبریز پل ارتباطی ایران با ترکیه و قفقاز است.
  en: |
    Tabriz is the capital of East Azerbaijan province and the largest Azeri-speaking
    city in Iran. It has a rich history of political activism, from the Constitutional
    Revolution to today. Tabriz is Iran's bridge to Turkey and the Caucasus.

