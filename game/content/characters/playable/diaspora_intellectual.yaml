backstory:
  fa: |
    متولد ۱۳۵۵ در شیراز، در خانواده‌ای تحصیل‌کرده و سکولار بزرگ شدید.
    پدرتان استاد دانشگاه بود و مادرتان پزشک. از کودکی با کتاب و بحث
    فلسفی آشنا بودید.

    در نوجوانی، خاطرات تلخ جنگ ایران و عراق و محدودیت‌های اجتماعی
    پس از انقلاب، شما را به سمت پرسشگری سوق داد. در دانشگاه تهران
    فلسفه خواندید و سپس برای دکترا به آمریکا رفتید.

    قصد بازگشت داشتید، اما وقایع ۸۸ همه چیز را تغییر داد. دوستان
    نزدیکتان زندانی شدند. شما در خارج ماندید و صدای آنان شدید.
  en: |
    Born in 1976 in Shiraz, you grew up in an educated, secular family.
    Your father was a university professor and your mother a physician.
    From childhood, you were familiar with books and philosophical debate.

    In your teenage years, the bitter memories of the Iran-Iraq War and
    post-revolution social restrictions pushed you toward questioning.
    You studied philosophy at Tehran University, then went to America
    for your doctorate.

    You intended to return, but the events of 2009 changed everything.
    Close friends were imprisoned. You stayed abroad and became their voice.

motivations:
  fa: |
    شما باور دارید که فشار بین‌المللی، آگاهی‌بخشی و همبستگی دیاسپورا
    می‌تواند به تغییر در ایران کمک کند. هدفتان ایجاد پل میان جنبش
    داخل و حمایت بین‌المللی است. می‌خواهید روزی به ایران آزاد برگردید.
  en: |
    You believe that international pressure, awareness-raising, and diaspora
    solidarity can help bring change to Iran. Your goal is to build bridges
    between the movement inside and international support. You dream of
    returning to a free Iran someday.

challenges:
  - fa: از ایران دور هستید و ارتباط مستقیم محدود است
    en: You are far from Iran with limited direct contact
  - fa: برخی در داخل شما را "خارج‌نشین" می‌دانند
    en: Some inside view you as a disconnected expatriate
  - fa: رژیم شما را تهدید امنیتی می‌داند
    en: The regime considers you a security threat
  - fa: باید میان ایده‌آل‌ها و واقعیت‌های سیاست بین‌الملل تعادل برقرار کنید
    en: You must balance ideals with international political realities

difficulty: challenging

