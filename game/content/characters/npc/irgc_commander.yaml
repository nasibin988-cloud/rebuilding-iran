# NPC Character: IRGC Commander
# A powerful military figure who could play kingmaker in a succession crisis

id: irgc_commander

name:
  fa: سرلشکر حسین سلامی
  en: Major General Hossein Salami

title:
  fa: فرمانده کل سپاه پاسداران
  en: Commander-in-Chief of the IRGC

portrait: irgc_commander.png

role: military_leader

biography:
  fa: |
    فرمانده کل سپاه پاسداران انقلاب اسلامی. یک نظامی کهنه‌کار که در
    جنگ ایران و عراق جنگید و از طریق سپاه به قدرت رسید. کنترل‌کننده
    یکی از قوی‌ترین نیروهای نظامی منطقه و امپراتوری اقتصادی گسترده.
  en: |
    Commander-in-Chief of the Islamic Revolutionary Guard Corps. A veteran
    military man who fought in the Iran-Iraq War and rose through the IRGC
    ranks. Controller of one of the most powerful military forces in the
    region and a vast economic empire.

