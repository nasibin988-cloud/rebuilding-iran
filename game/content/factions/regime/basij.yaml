description:
  fa: |
    بسیج نیروی شبه‌نظامی داوطلب است که زیر نظر سپاه فعالیت می‌کند.
    با میلیون‌ها عضو، بسیج در سرکوب اعتراضات، کنترل اجتماعی، و
    بسیج سیاسی نقش کلیدی دارد. اعضای آن از طبقات مختلف اجتماعی هستند.
  en: |
    The Basij is a paramilitary volunteer force operating under the IRGC.
    With millions of members, the Basij plays a key role in suppressing
    protests, social control, and political mobilization. Its members come
    from various social classes.

